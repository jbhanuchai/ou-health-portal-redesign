<!DOCTYPE html>
<html lang="en">

<!-- ============================================================
     FILE: forms.html
     PURPOSE: Forms page for the OU HealthConnection Patient
              Portal. This is where new patient paperwork and
              other intake or consent forms live.
     ============================================================
     Styling for this page is split across three stylesheets,
     loaded in order of dependency: base.css provides the
     global tokens and shell, dashboard.css provides the
     shared portal layout, and forms.css adds the page
     specific rules for the form list row, status pill, and
     action button.

     This page is currently static. No page specific
     JavaScript is required.
     ============================================================ -->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/forms.css" />
</head>

<body>

    <!-- ====================================================
         TOPBAR
         ==================================================== -->
    <header class="topbar">

        <div class="topbar-brand">
            <div class="brand-logo">
                <img src="icons/stethoscope.svg" class="icon icon-md" alt="" />
            </div>
            <div class="brand-text">
                <div class="title">OU HealthConnection</div>
                <div class="sub">University of Oklahoma Patient Portal</div>
            </div>
        </div>

        <div class="topbar-right">
            <div class="search-bar">
                <img src="icons/search.svg" class="icon icon-md" alt="" />
                <input type="text" placeholder="Search..." />
            </div>
            <div class="icon-btn"><img src="icons/bell.svg" class="icon icon-md" alt="" /></div>
            <div class="icon-btn"><img src="icons/msg.svg" class="icon icon-md" alt="" /></div>
            <div class="avatar" onclick="window.location.href='profile.html'">JS</div>
        </div>
    </header>


    <!-- ====================================================
         MAIN LAYOUT
         ==================================================== -->
    <main class="main">

        <nav class="nav-panel">

            <div class="nav-panel-header">
                <p>Navigation</p>
                <h2>Patient Menu</h2>
            </div>

            <button class="nav-btn" onclick="window.location.href='dashboard.html'">
                <div class="nav-icon"><img src="icons/homeicon.svg" class="icon icon-md" alt="" /></div>
                <span class="nav-label">Home</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <button class="nav-btn" onclick="window.location.href='appointments.html'">
                <div class="nav-icon"><img src="icons/appticon.svg" class="icon icon-md" alt="" /></div>
                <span class="nav-label">Appointments</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <button class="nav-btn" onclick="window.location.href='immunizations.html'">
                <div class="nav-icon"><img src="icons/immune.svg" class="icon icon-md" alt="" /></div>
                <span class="nav-label">Immunizations</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <button class="nav-btn" onclick="window.location.href='upload.html'">
                <div class="nav-icon"><img src="icons/uploadicon.svg" class="icon icon-md" alt="" /></div>
                <span class="nav-label">Upload</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <button class="nav-btn active" onclick="window.location.href='forms.html'">
                <div class="nav-icon"><img src="icons/formsicon.svg" class="icon icon-md" alt="" /></div>
                <span class="nav-label">Forms</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <button class="nav-btn" onclick="window.location.href='messaging.html'">
                <div class="nav-icon"><img src="icons/msg.svg" class="icon icon-md" alt="" /></div>
                <span class="nav-label">Secure Messaging</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <button class="nav-btn" onclick="window.location.href='insurance.html'">
                <div class="nav-icon"><img src="icons/insuranceicon.svg" class="icon icon-md" alt="" /></div>
                <span class="nav-label">Insurance</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <button class="nav-btn" onclick="window.location.href='education.html'">
                <div class="nav-icon"><img src="icons/education.svg" class="icon icon-md" alt="" /></div>
                <span class="nav-label">Patient Education</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <button class="nav-btn" onclick="window.location.href='profile.html'">
                <div class="nav-icon"><img src="icons/profileicon.svg" class="icon icon-md" alt="" /></div>
                <span class="nav-label">My Profile</span>
                <span class="nav-arrow">&#8250;</span>
            </button>
        </nav>


        <!-- ====================================================
             CONTENT PANEL
             ==================================================== -->
        <section class="content-panel">

            <!-- Page heading (compact variant) -->
            <div class="welcome-card welcome-card--compact">
                <h1 class="welcome-title">
                    <span class="highlight">Forms</span>
                </h1>
                <div class="welcome-subtitle">New patient paperwork, consent, and intake forms</div>
            </div>


            <!-- Forms list -->
            <div class="welcome-card records-card">

                <div class="records-header">
                    <h4 class="records-header-title">Available Forms</h4>
                </div>

                <div class="records-list">

                    <div class="record-row form-row">
                        <div class="form-row-icon">
                            <img src="icons/formsiconblue.svg" class="icon icon-md" alt="" />
                        </div>
                        <div class="form-row-text">
                            <strong class="record-name">New Patient Paperwork</strong>
                            <div class="record-detail">Personal, contact, and emergency information</div>
                        </div>
                        <span class="status-badge status-badge--required">Required</span>
                        <button class="form-action-btn primary">Start</button>
                    </div>

                </div>
            </div>

            <div class="footer-note">HealthConnection Patient Portal</div>
        </section>
    </main>

</body>

</html>
