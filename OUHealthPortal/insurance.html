<!DOCTYPE html>
<html lang="en">

<!-- ============================================================
     FILE: dashboard.html
     PURPOSE: Authenticated dashboard (home screen) for the
              OU HealthConnection Patient Portal.
     ============================================================
     The dashboard presents the patient menu in a navigation
     panel on the left and a content panel on the right that
     contains:
     
       A welcome card with the portal name highlighted in the
       brand gradient, a horizontal divider, and a stack of
       informational notices and alerts.
       
       A row of three summary tiles that surface at a glance
       information about appointment slots, portal access,
       and security compliance.
     ============================================================ -->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OU HealthConnection</title>

    <!-- External icon library for all Font Awesome glyphs -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Internal stylesheets. The base sheet defines global
         tokens and the topbar while the dashboard sheet
         adds layout rules that are unique to this page. -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
</head>

<body>

    <!-- ====================================================
         TOPBAR
         The dashboard topbar extends the shared brand block
         with a search bar and a cluster of utility controls
         on the right (notifications, messages, and avatar).
         ==================================================== -->
    <header class="topbar">

        <!-- Brand block with logo and portal title -->
        <div class="topbar-brand">
            <div class="brand-logo">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                </svg>
            </div>
            <div class="brand-text">
                <div class="title">OU HealthConnection</div>
                <div class="sub">University of Oklahoma Patient Portal</div>
            </div>
        </div>

        <!-- Right hand group of topbar controls -->
        <div class="topbar-right">

            <!-- Pill shaped search bar with an inline
                 magnifying glass icon. -->
            <div class="search-bar">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                     stroke="#8fafd6" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" placeholder="Search..." />
            </div>

            <!-- Notification bell button -->
            <div class="icon-btn"><i class="fa-solid fa-bell"></i></div>

            <!-- Secure messaging shortcut button -->
            <div class="icon-btn"><i class="fa-solid fa-message"></i></div>

            <!-- User avatar.
                 Currently displays the patients initials.
                 In production this would link to the profile
                 menu or display a profile photograph. -->
            <div class="avatar">JS</div>
        </div>
    </header>


    <!-- ====================================================
         MAIN LAYOUT
         Two column layout with the navigation panel on the
         left and the content panel on the right.
         ==================================================== -->
    <main class="main">

        <!-- ---- Navigation Panel ----
             Holds the Patient Menu header followed by a
             column of navigation buttons. Each button
             invokes setActive from dashboard.js when
             clicked so that only one item appears active
             at any given time. -->
        <nav class="nav-panel">

            <!-- Panel header labels the navigation region. -->
            <div class="nav-panel-header">
                <p>Navigation</p>
                <h2>Patient Menu</h2>
            </div>

            <!-- Home (active by default) -->
            <button class="nav-btn" onclick="window.location.href='dashboard.html'">
                <div class="nav-icon"><i class="fa-solid fa-house"></i></div>
                <span class="nav-label">Home</span>
                <span class="nav-arrow">&#8250;</span>
                <a href="dashboard.html"></a>
            </button>

            <!-- Appointments -->
            <button class="nav-btn" onclick="window.location.href='appointments.html'">
                <div class="nav-icon"><i class="fa-solid fa-calendar-days"></i></div>
                <span class="nav-label">Appointments</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <!-- Immunizations -->
            <button class="nav-btn" onclick="window.location.href='immunizations.html'">
                <div class="nav-icon"><i class="fa-solid fa-syringe"></i></div>
                <span class="nav-label">Immunizations</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <!-- Upload (medical documents) -->
            <button class="nav-btn" onclick="window.location.href='upload.html'">
                <div class="nav-icon"><i class="fa-solid fa-upload"></i></div>
                <span class="nav-label">Upload</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <!-- Forms (such as new patient paperwork) -->
            <button class="nav-btn"onclick="window.location.href='forms.html'">
                <div class="nav-icon"><i class="fa-solid fa-pencil"></i></div>
                <span class="nav-label">Forms</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <!-- Secure Messaging -->
            <button class="nav-btn"onclick="window.location.href='messaging.html'">
                <div class="nav-icon"><i class="fa-solid fa-envelope"></i></div>
                <span class="nav-label">Secure Messaging</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <!-- Insurance information -->
            <button class="nav-btn active"onclick="window.location.href='insurance.html'">
                <div class="nav-icon"><i class="fa-solid fa-umbrella"></i></div>
                <span class="nav-label">Insurance</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <!-- Patient Education resources -->
            <button class="nav-btn"onclick="window.location.href='education.html'">
                <div class="nav-icon"><i class="fa-solid fa-bell"></i></div>
                <span class="nav-label">Patient Education</span>
                <span class="nav-arrow">&#8250;</span>
            </button>

            <!-- My Profile -->
            <button class="nav-btn"onclick="window.location.href='profile.html'">
                <div class="nav-icon"><i class="fa-solid fa-circle-user"></i></div>
                <span class="nav-label">My Profile</span>
                <span class="nav-arrow">&#8250;</span>
            </button>
        </nav>

            <!-- Small centered footer label reinforcing the
                 portal name. -->
            <div class="footer-note">HealthConnection Patient Portal</div>
        </section>
    </main>

</body>

</html>
