<!DOCTYPE html>
<html lang="en">

<!-- ============================================================
     FILE: login.html
     PURPOSE: Sign in page for the OU HealthConnection
              Patient Portal.
     ============================================================
     This page is currently a styled template. The credentials
     form is functional, and the Sign In button routes to the
     dashboard so the page-to-page navigation can be tested.
     The previous Single Sign On block, the password
     visibility toggle, and the bottom secure strip have been
     removed while the design is finalized; they can be added
     back when the auth flow is built out.
     ============================================================ -->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OU HealthConnection: Sign In</title>

    <!-- Internal stylesheets. The base sheet provides global
         tokens and the auth sheet provides the centered card
         and form styling shared with the registration page. -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth-forms.css" />

    <!-- Template override: removes the left padding that
         auth-forms.css reserves for input icons. Delete this
         block once custom SVG input icons are reintroduced. -->
    <style>
        .auth-card .form-input { padding-left: 14px; }
        select.auth-card .form-input { padding-left: 14px; }
    </style>
</head>

<body>

    <!-- ====================================================
         TOPBAR
         The auth topbar shows the brand block on the left
         and a single secondary link on the right. The link
         offers a direct path to the registration page for
         first time visitors.
         ==================================================== -->
    <header class="topbar">

        <div class="topbar-brand">
            <div class="brand-logo">
                <img src="icons/stethoscope.svg" class="icon icon-md" alt="" />
            </div>
            <div class="brand-text">
                <div class="title">OU HealthConnection</div>
                <div class="sub">University of Oklahoma Patient Portal</div>
            </div>
        </div>

        <a href="register.html" class="topbar-link">Create Account</a>
    </header>


    <!-- ====================================================
         PAGE BODY
         The page wrapper centers the auth card both
         horizontally and vertically inside the viewport.
         ==================================================== -->
    <main class="page">
        <div class="auth-card">

            <!-- ---- Card Header Band ----
                 Brand badge plus a welcome heading and a
                 short supporting description. -->
            <div class="card-header">
                <div class="header-icon">
                    <img src="icons/stethoscope.svg" class="icon icon-md" alt="" />
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to access your patient portal</p>
            </div>


            <!-- ---- Card Body ----
                 Holds the credential form, the utility row,
                 and the primary sign in action. -->
            <div class="card-body">

                <!-- Username field. Accepts an OU username or
                     a full OU email address. -->
                <div class="form-group">
                    <label class="form-label" for="username">OU Username or Email</label>
                    <div class="input-wrap">
                        <input id="username" class="form-input" type="text"
                               placeholder="e.g. jsmith@ou.edu" />
                    </div>
                </div>

                <!-- Password field. -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrap">
                        <input id="password" class="form-input" type="password"
                               placeholder="Enter your password" />
                    </div>
                </div>

                <!-- Utility row.
                     Remember Me checkbox on the left and a
                     Forgot Password link on the right. -->
                <div class="row-between">
                    <label class="checkbox-wrap">
                        <input type="checkbox" /> Remember me
                    </label>
                    <a href="#" class="link">Forgot password?</a>
                </div>

                <!-- Primary sign in button. Routes to the
                     dashboard so the rest of the portal can
                     be navigated. -->
                <button class="btn-primary" type="button"
                        onclick="window.location.href='dashboard.html'">
                    Sign In
                </button>

            </div>


            <!-- ---- Card Footer ----
                 Directs visitors without an account to the
                 registration page. -->
            <div class="card-footer">
                Don't have an account?
                <a href="register.html" class="link">Create one now</a>
            </div>
        </div>
    </main>

</body>

</html>
